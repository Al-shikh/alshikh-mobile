margin-left: auto;

            padding: 15px;
            width: calc(30% - 30px); 
            background-color: rgb(9, 0, 0);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .brand-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .brand-box img {
            width: 100%;
            height: 150px;
            object-fit: contain; 
            margin-bottom: 10px;
        }

        .brand-box h3 {
            font-size: 18px;
            margin: 10px 0;
            color: #333;
        }

            .brand-box {

            }

                height: 100px;
            }

                gap: 10px;
            }
