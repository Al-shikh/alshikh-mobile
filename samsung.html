          .product-box {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            width: calc(20% - 20px); 
            background-color: rgb(247, 246, 246);
            box-shadow: 0 2px 1px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            aspect-ratio: 1 / 1; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }


        .product-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 10px rgba(0, 0, 0, 0.2);
        }

        .product-box img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
            aspect-ratio: 2 / 1;
        }

        .product-box h3 {
            font-size: 18px;
            margin: 10px 0;
            color: #333;
        }

        .product-box p {
            font-size: 14px;
            color: #666;
        }

        .product-box .price {
            font-size: 16px;
            font-weight: bold;
            color: #15aa0b;
